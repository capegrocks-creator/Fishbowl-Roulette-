kind = "web"
previewPath = "/"
title = "Fishbowl Roulette"
version = "1.0.0"
id = "artifacts/fishbowl-roulette"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25880

[services.development]
run = "pnpm --filter @workspace/fishbowl-roulette run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fishbowl-roulette", "run", "build" ]
publicDir = "artifacts/fishbowl-roulette/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25880"
BASE_PATH = "/"
